name: Debug API interpelacji

on:
  push:
    branches: [debug/api-check]

permissions:
  contents: write

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Policz dzisiejszą paczkę
        run: |
          mkdir -p debug
          B="https://api.sejm.gov.pl/sejm/term10/interpellations"
          : > debug/wyniki2.txt
          for off in 0 500 1000; do
            curl -sS --max-time 60 "$B?modifiedSince=2026-07-07T00:00&limit=500&offset=$off" -o /tmp/p$off.json
          done
          jq -s 'add' /tmp/p0.json /tmp/p500.json /tmp/p1000.json > /tmp/all.json
          {
            echo "Zmodyfikowane od 2026-07-07T00:00 (do 1500): $(jq 'length' /tmp/all.json)"
            echo "…w tym z odpowiedziami (replies>0): $(jq '[.[] | select((.replies|length)>0)] | length' /tmp/all.json)"
            echo "Rozkład lastModified:"
            jq -r '.[].lastModified' /tmp/all.json | sort | uniq -c | sort -rn | head
          } >> debug/wyniki2.txt
          cat debug/wyniki2.txt

      - name: Commit wyników
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug/
          git commit -m "Wyniki diagnostyki API - runda 2"
          git push
